<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 100" width="450" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800&amp;display=swap');
      .accent { fill: none; stroke: #06B6D4; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
      .cursor { fill: #06B6D4; }
      .font-main { font-family: 'Inter', system-ui, sans-serif; font-size: 44px; font-weight: 800; letter-spacing: -1px;}
      .text-white { fill: #F9FAFB; }
      .text-gray { fill: #9CA3AF; }
      .text-accent { fill: #06B6D4; }
    </style>
  </defs>

  <!-- < / > Accent -->
  <polyline class="accent" points="30,35 15,50 30,65"/>
  <line class="accent" x1="40" y1="65" x2="55" y2="35"/>
  <polyline class="accent" points="65,35 80,50 65,65"/>

  <!-- Logo Text -->
  <text x="100" y="65" class="font-main">
    <tspan class="text-white">haunguyen</tspan>
    <tspan class="text-accent">.</tspan>
    <tspan class="text-gray">dev</tspan>
    <!-- Terminal Cursor Blink -->
    <tspan class="cursor" dx="4">
      _
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
    </tspan>
  </text>
</svg>
