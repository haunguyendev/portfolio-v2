# CI/CD Pipeline: Build Docker images → Push to GHCR → Deploy to server via SSH
#
# Flow:
# 1. Push to main → trigger workflow
# 2. Detect which apps changed (dorny/paths-filter)
# 3. Build only changed app images in parallel
# 4. Push images to GitHub Container Registry (ghcr.io)
# 5. SSH into server → pull only changed images → restart containers
#
# Required GitHub Secrets:
# - SERVER_HOST: Cloudflare Tunnel hostname (e.g., ssh.yourdomain.com)
# - SERVER_USER: SSH username on server
# - SSH_PRIVATE_KEY: SSH private key for authentication

name: Deploy

on:
  push:
    branches:
      - main
    # Chỉ deploy khi code thay đổi (không deploy khi chỉ sửa docs/plans)
    paths-ignore:
      - "docs/**"
      - "plans/**"
      - "*.md"
  # Cho phép trigger thủ công từ GitHub UI
  workflow_dispatch:

# Quyền cần thiết
permissions:
  contents: read
  packages: write

# Đảm bảo chỉ 1 deploy chạy cùng lúc
concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/${{ github.repository }}/web
  API_IMAGE: ghcr.io/${{ github.repository }}/api

jobs:
  # ============================================
  # Job 1: Detect which apps have code changes
  # ============================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'

  # ============================================
  # Job 2: Build & Push Web image (conditional)
  # ============================================
  build-web:
    name: Build Web Image
    needs: changes
    if: needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # ============================================
  # Job 3: Build & Push API image (conditional)
  # ============================================
  build-api:
    name: Build API Image
    needs: changes
    if: needs.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  # ============================================
  # Job 4: Deploy to server via SSH (smart pull)
  # ============================================
  deploy:
    name: Deploy to Server
    needs: [changes, build-web, build-api]
    # Run if at least one build succeeded (skipped is OK, failure is not)
    if: |
      always() &&
      (needs.build-web.result == 'success' || needs.build-web.result == 'skipped') &&
      (needs.build-api.result == 'success' || needs.build-api.result == 'skipped') &&
      (needs.build-web.result == 'success' || needs.build-api.result == 'success')
    runs-on: ubuntu-latest
    steps:
      # Cài cloudflared để SSH qua Cloudflare Tunnel
      - name: Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      # Setup SSH config để dùng cloudflared làm proxy
      - name: Setup SSH config
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host deploy-server
            HostName ${{ secrets.SERVER_HOST }}
            User ${{ secrets.SERVER_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ProxyCommand cloudflared access ssh --hostname %h
          EOF

      # Deploy chỉ những services đã thay đổi
      - name: Deploy via SSH
        env:
          WEB_CHANGED: ${{ needs.changes.outputs.web }}
          API_CHANGED: ${{ needs.changes.outputs.api }}
        run: |
          PULL_SERVICES=""
          if [ "$WEB_CHANGED" = "true" ]; then PULL_SERVICES="$PULL_SERVICES web"; fi
          if [ "$API_CHANGED" = "true" ]; then PULL_SERVICES="$PULL_SERVICES api"; fi

          ssh deploy-server "cd /opt/portfolio && \
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
            docker compose -f docker-compose.prod.yml pull $PULL_SERVICES && \
            docker compose -f docker-compose.prod.yml up -d $PULL_SERVICES --remove-orphans && \
            docker image prune -f && \
            echo 'Deployed: $PULL_SERVICES'"
