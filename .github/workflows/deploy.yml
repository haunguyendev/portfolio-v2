# CI/CD Pipeline: Build Docker images → Push to GHCR → Deploy to server via SSH
#
# Flow:
# 1. Push to main → trigger workflow
# 2. Build web + api Docker images (parallel)
# 3. Push images to GitHub Container Registry (ghcr.io)
# 4. SSH into server → pull new images → restart containers
#
# Required GitHub Secrets:
# - SERVER_HOST: Cloudflare Tunnel hostname (e.g., ssh.yourdomain.com)
# - SERVER_USER: SSH username on server
# - SSH_PRIVATE_KEY: SSH private key for authentication

name: Deploy

on:
  push:
    branches:
      - main
    # Chỉ deploy khi code thay đổi (không deploy khi chỉ sửa docs/plans)
    paths-ignore:
      - "docs/**"
      - "plans/**"
      - "*.md"
  # Cho phép trigger thủ công từ GitHub UI
  workflow_dispatch:

# Quyền cần thiết
permissions:
  contents: read
  packages: write

# Đảm bảo chỉ 1 deploy chạy cùng lúc
concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/${{ github.repository }}/web
  API_IMAGE: ghcr.io/${{ github.repository }}/api

jobs:
  # ============================================
  # Job 1: Build & Push Docker images
  # ============================================
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # Login vào GitHub Container Registry
      # GITHUB_TOKEN tự động có sẵn — không cần tạo secret
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Setup Docker Buildx (hỗ trợ cache, multi-platform)
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build & Push WEB image
      - name: Build & Push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build & Push API image
      - name: Build & Push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Job 2: Deploy to server via SSH
  # ============================================
  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest

    steps:
      # Cài cloudflared để SSH qua Cloudflare Tunnel
      - name: Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      # Setup SSH config để dùng cloudflared làm proxy
      - name: Setup SSH config
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host deploy-server
            HostName ${{ secrets.SERVER_HOST }}
            User ${{ secrets.SERVER_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ProxyCommand cloudflared access ssh --hostname %h
          EOF

      # Login GHCR trên server (packages private, cần auth để pull)
      - name: Deploy via SSH
        run: |
          ssh deploy-server "cd /opt/portfolio && \
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
            docker compose -f docker-compose.prod.yml pull web api && \
            docker compose -f docker-compose.prod.yml up -d --remove-orphans && \
            docker image prune -f && \
            echo 'Deploy complete!'"
