<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&amp;display=swap');
      .accent { fill: none; stroke: #06B6D4; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
      .text-h { font-family: 'JetBrains Mono', monospace; font-size: 55px; font-weight: 800; fill: #111827; }
      .cursor { fill: #06B6D4; }
    </style>
  </defs>

  <!-- < h/ > Favicon Accent -->
  <polyline class="accent" points="20,35 5,50 20,65"/>
  <text x="32" y="68" class="text-h">h</text>
  <line class="accent" x1="68" y1="65" x2="83" y2="35"/>

  <!-- Small Cursor -->
  <rect x="88" y="48" width="8" height="18" class="cursor" />
</svg>
